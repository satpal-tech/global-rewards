<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Rewards - Surf Websites</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background: #d32f2f; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 800px; margin: 20px auto; padding: 10px; }
        .website-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #ff9800; }
        .info { flex-grow: 1; margin-left: 15px; }
        .title { font-weight: bold; color: #007bff; font-size: 1.1em; text-decoration: none; cursor: pointer; }
        .points-badge { background: #fff3e0; color: #e65100; padding: 5px 12px; border-radius: 20px; font-weight: bold; border: 1px solid #ffcc80; }
        .visit-btn { background: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 1.5em; font-weight: bold;">Satpal Rewards</div>
    <div>Balance: <span>$1.00</span></div>
</div>

<div class="container">
    <div id="websiteList">Loading websites...</div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyANi2n_ludMyRM0y40i2TxPDIrQ3tRsoDU",
      authDomain: "satpal-f535c.firebaseapp.com",
      projectId: "satpal-f535c",
      storageBucket: "satpal-f535c.firebasestorage.app",
      messagingSenderId: "480222653659",
      appId: "1:480222653659:web:8408ba7ccc5a34c09ef0fe",
      measurementId: "G-7FZY6DB1QJ"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadWebsites() {
        const listDiv = document.getElementById('websiteList');
        const snapshot = await db.collection("orders").get();
        listDiv.innerHTML = "";
        
        snapshot.forEach(doc => {
            const data = doc.data();
            listDiv.innerHTML += `
                <div class="website-card">
                    <div class="points-badge">50</div>
                    <div class="info">
                        <a href="${data.location}" target="_blank" class="title">${data.name || 'View Website'}</a>
                    </div>
                    <a href="${data.location}" target="_blank" class="visit-btn">Visit</a>
                </div>
            `;
        });
    }
    window.onload = loadWebsites;
</script>
</body>
</html>
