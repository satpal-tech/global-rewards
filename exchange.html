<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendu Tech - Organic Exchange</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-blue { background: #1a73e8; color: white; }
        .btn-green { background: #34a853; color: white; }
        .status-tag { padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .pending { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .active { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .terminal { background: #1c1c1c; color: #00ff41; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; margin-top: 10px; height: 80px; overflow-y: auto; display: none; }
    </style>
</head>
<body>

<div class="container" id="authBox">
    <h2 style="text-align:center; color:#1a73e8;">Pendu Tech Login</h2>
    <input type="email" id="email" placeholder="Email ID">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn btn-blue" onclick="loginUser()">Login / Register</button>
</div>

<div class="container hidden" id="userDashboard">
    <h3>ਜੀ ਆਇਆਂ ਨੂੰ, <span id="userDisp" style="color:#1a73e8;"></span></h3>
    <div id="statusTag" class="status-tag pending">ਸਟੇਟਸ: ਪੇਮੈਂਟ ਦੀ ਉਡੀਕ ਹੈ...</div>
    
    <label>Target Keyword:</label>
    <input type="text" id="keyword" placeholder="e.g. Pendu Tech Punjab">
    
    <label>Website URL:</label>
    <input type="url" id="siteURL" placeholder="https://yourblog.com">

    <button id="runBtn" class="btn btn-green" style="opacity:0.4;" disabled onclick="startBoost()">Launch Traffic Booster</button>
    
    <div class="terminal" id="term"></div>
    <p id="lockMsg" style="color:red; font-size:12px; text-align:center; margin-top:10px;">*ਸੌਫਟਵੇਅਰ ਚਲਾਉਣ ਲਈ ਐਡਮਿਨ ਤੋਂ ਆਈਡੀ ਐਕਟਿਵ ਕਰਵਾਓ।</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyANi2n_ludMyRM0y40I2TxPDIrQ3tRsoDU",
        authDomain: "satpal-f535c.firebaseapp.com",
        projectId: "satpal-f535c",
        storageBucket: "satpal-f535c.firebasestorage.app",
        messagingSenderId: "480222653659",
        appId: "1:480222653659:web:8408ba7ccc5a34c09ef0fe"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function loginUser() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Details ਭਰੋ");

        const userId = email.replace(/[^a-zA-Z0-9]/g, "");
        const userRef = db.collection("users").doc(userId);
        
        userRef.get().then((doc) => {
            if (doc.exists) {
                renderDashboard(doc.data());
            } else {
                const newUser = { email, password: pass, status: "pending", timestamp: new Date() };
                userRef.set(newUser).then(() => renderDashboard(newUser));
            }
        });
    }

    function renderDashboard(data) {
        document.getElementById('authBox').classList.add('hidden');
        document.getElementById('userDashboard').classList.remove('hidden');
        document.getElementById('userDisp').innerText = data.email;
        
        if(data.status === "active") {
            const tag = document.getElementById('statusTag');
            tag.className = "status-tag active";
            tag.innerText = "Status: ACTIVE ✅";
            document.getElementById('runBtn').disabled = false;
            document.getElementById('runBtn').style.opacity = "1";
            document.getElementById('lockMsg').style.display = "none";
        }
    }

    function startBoost() {
        const term = document.getElementById('term');
        term.style.display = 'block';
        term.innerHTML = "> Connecting to Pendu Tech Servers...<br>> Verifying 150+ IPs...<br>> Starting Organic Traffic Flow...";
        alert("ਸਿਸਟਮ ਸ਼ੁਰੂ ਹੋ ਗਿਆ ਹੈ। ਪੇਜ ਬੰਦ ਨਾ ਕਰੋ।");
    }
</script>
</body>
</html>
