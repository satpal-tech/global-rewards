<!DOCTYPE html>
<html lang="pa">
<head>
    <title>Pendu Tech - BOSS CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .panel { max-width: 900px; margin: auto; background: #1e1e1e; padding: 25px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background: #1a73e8; }
        .btn-ok { background: #34a853; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; }
        .btn-stop { background: #ea4335; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>👨‍💻 Pendu Tech - Admin Control</h1>
    <p>ਯੂਜ਼ਰਸ ਦੀ ਪੇਮੈਂਟ ਵੈਰੀਫਾਈ ਕਰਕੇ ਉਹਨਾਂ ਨੂੰ "Approve" ਕਰੋ।</p>
    <table>
        <thead>
            <tr>
                <th>User Email</th>
                <th>Password</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyANi2n_ludMyRM0y40I2TxPDIrQ3tRsoDU",
        projectId: "satpal-f535c",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ਰੀਅਲ-ਟਾਈਮ ਡੇਟਾ ਲੋਡ ਕਰਨਾ
    db.collection("users").orderBy("timestamp", "desc").onSnapshot((querySnapshot) => {
        let html = "";
        querySnapshot.forEach((doc) => {
            const user = doc.data();
            const id = doc.id;
            html += `<tr>
                <td>${user.email}</td>
                <td>${user.password}</td>
                <td style="color:${user.status === 'active' ? '#34a853' : '#fbbc05'}">${user.status.toUpperCase()}</td>
                <td>
                    <button class="btn-ok" onclick="updateStatus('${id}', 'active')">Approve</button>
                    <button class="btn-stop" onclick="updateStatus('${id}', 'pending')">Block</button>
                </td>
            </tr>`;
        });
        document.getElementById('rows').innerHTML = html;
    });

    function updateStatus(id, stat) {
        db.collection("users").doc(id).update({ status: stat })
        .then(() => alert("ਯੂਜ਼ਰ ਸਟੇਟਸ ਬਦਲ ਦਿੱਤਾ ਗਿਆ ਹੈ!"));
    }
</script>
</body>
</html>
