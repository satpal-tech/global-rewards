<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - $1 Task Manager</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; }
        h2 { color: #333; text-align: center; }
        .admin-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f1f1f1; }
        img { width: 80px; height: auto; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        img:hover { transform: scale(3); }
        .del-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .status-tag { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Admin Dashboard - User Submissions</h2>
    <table id="adminTable">
        <thead>
            <tr>
                <th>ਨਾਮ</th>
                <th>ਫੋਨ</th>
                <th>ਰੇਟ</th>
                <th>ਪਰੂਫ਼ (Photo)</th>
                <th>ਲੋਕੇਸ਼ਨ</th>
                <th>ਐਕਸ਼ਨ</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // ਇੱਥੇ ਆਪਣੀ ਫਾਇਰਬੇਸ ਕਨਫਿਗ ਭਰੋ
    const firebaseConfig = {
        apiKey: "ਤੁਹਾਡੀ_API_KEY",
        authDomain: "satpal-f535c.firebaseapp.com",
        projectId: "satpal-f535c",
        storageBucket: "satpal-f535c.appspot.com",
        appId: "ਤੁਹਾਡਾ_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ਡੇਟਾ ਲੋਡ ਕਰਨਾ
    db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const id = doc.id;
            
            tbody.innerHTML += `
                <tr>
                    <td>${data.name}</td>
                    <td>${data.phone}</td>
                    <td class="status-tag">${data.rate || "$1"}</td>
                    <td><a href="${data.photo}" target="_blank"><img src="${data.photo}" alt="Proof"></a></td>
                    <td><a href="${data.location}" target="_blank">View Map</a></td>
                    <td><button class="del-btn" onclick="deleteEntry('${id}')">Delete</button></td>
                </tr>`;
        });
    });

    // ਡੇਟਾ ਡਿਲੀਟ ਕਰਨ ਲਈ ਫੰਕਸ਼ਨ
    async function deleteEntry(id) {
        if(confirm("ਕੀ ਤੁਸੀਂ ਇਸ ਐਂਟਰੀ ਨੂੰ ਡਿਲੀਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            try {
                await db.collection("orders").doc(id).delete();
                alert("Deleted!");
            } catch (error) {
                alert("Error: " + error.message);
            }
        }
    }
</script>

</body>
</html>
