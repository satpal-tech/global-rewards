<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Satpal Tech</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .header { background: #1a73e8; color: white; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #555; }
        .user-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid #ddd; }
        .user-img:hover { transform: scale(2.5); transition: 0.3s; z-index: 10; position: relative; }
        .btn-del { background: #d93025; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-loc { background: #34a853; color: white; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 13px; }
        .rate-text { color: #188038; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>Admin Panel - Submissions List</h1>
</div>

<div class="container">
    <table id="adminTable">
        <thead>
            <tr>
                <th>ਨਾਮ (Name)</th>
                <th>ਫ਼ੋਨ (Phone)</th>
                <th>ਰੇਟ (Rate)</th>
                <th>ਸਬੂਤ (Proof)</th>
                <th>ਲੋਕੇਸ਼ਨ (Location)</th>
                <th>ਐਕਸ਼ਨ (Action)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    // ਤੁਹਾਡੀ ਫਾਇਰਬੇਸ ਕਨਫਿਗ (ਇੱਥੇ ਆਪਣੀ ਜਾਣਕਾਰੀ ਭਰੋ)
    const firebaseConfig = {
        apiKey: "ਤੁਹਾਡੀ_API_KEY",
        authDomain: "satpal-f535c.firebaseapp.com",
        projectId: "satpal-f535c",
        storageBucket: "satpal-f535c.appspot.com",
        appId: "ਤੁਹਾਡਾ_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ਡੇਟਾ ਨੂੰ Firestore ਤੋਂ ਪੜ੍ਹਨਾ (Orders collection)
    db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ""; // ਪੁਰਾਣਾ ਡੇਟਾ ਸਾਫ਼ ਕਰੋ
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const docId = doc.id;
            
            tbody.innerHTML += `
                <tr>
                    <td><b>${data.name || 'N/A'}</b></td>
                    <td>${data.phone || 'N/A'}</td>
                    <td class="rate-text">${data.rate || "$1"}</td>
                    <td>
                        <a href="${data.photo}" target="_blank">
                            <img src="${data.photo}" class="user-img" alt="Proof">
                        </a>
                    </td>
                    <td>
                        <a href="${data.location}" target="_blank" class="btn-loc">Map ਦੇਖੋ</a>
                    </td>
                    <td>
                        <button class="btn-del" onclick="deleteEntry('${docId}')">Delete</button>
                    </td>
                </tr>`;
        });
    });

    // ਡਿਲੀਟ ਕਰਨ ਲਈ ਫੰਕਸ਼ਨ
    async function deleteEntry(id) {
        if(confirm("ਕੀ ਤੁਸੀਂ ਇਹ ਡੇਟਾ ਡਿਲੀਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ?")) {
            try {
                await db.collection("orders").doc(id).delete();
                alert("Deleted Successfully!");
            } catch (error) {
                alert("Error: " + error.message);
            }
        }
    }
</script>

</body>
</html>
